version: "3.8"

services:

  portfolio:
    image: username/portfolio-website:latest

    ports:
      - "80:3000"

    deploy:
      replicas: 3

      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

      update_config:
        parallelism: 1
        delay: 10s

      resources:
        limits:
          cpus: "0.5"
          memory: 512M